spring:
  application:
    name: hojeafestaenossa

  actuator:
    endpoints:
      web:
        exposure:
          include: health,info
    endpoint:
      health:
        show-details: always
        probes:
          enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hojeafestaenossa?stringtype=unspecified}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

oci:
  enabled: true
  region: sa-saopaulo-1
  tenancy-id: ${OCI_TENANCY_ID}
  user-id: ${OCI_USER_ID}
  fingerprint: ${OCI_FINGERPRINT}
  private-key-path: ${OCI_PRIVATE_KEY_PATH}
  namespace: ${OCI_NAMESPACE}
  bucket-name: hojeafestaenossa

logging:
  level:
    com.oracle.bmc: INFO

app:
  storage:
    type: oci
  base-url: http://localhost:5174
  admin:
    key: ${ADMIN_KEY:change-me-in-production}