spring:
  application:
    name: hojeafestaenossa

  datasource:
    url: jdbc:postgresql://localhost:5432/hojeafestaenossa?stringtype=unspecified
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

oci:
  enabled: false
  region: sa-saopaulo-1
  tenancy-id: ${OCI_TENANCY_ID}
  user-id: ${OCI_USER_ID}
  fingerprint: ${OCI_FINGERPRINT}
  private-key-path: ${OCI_PRIVATE_KEY_PATH}
  namespace: ${OCI_NAMESPACE}
  bucket-name: hojeafestaenossa

logging:
  level:
    com.oracle.bmc: INFO

app:
  base-url: https://hojeafestaenossa.site