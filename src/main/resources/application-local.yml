# Profile Local - Para desenvolvimento sem OCI
# Ative com: SPRING_PROFILES_ACTIVE=local

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/hojeafestaenossa
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

logging:
  level:
    com.rafaellima.hojeafestaenossa: DEBUG
    org.springframework.web: DEBUG

app:
  storage:
    type: local
  base-url: http://localhost:8080
  admin:
    key: local-admin-key-123